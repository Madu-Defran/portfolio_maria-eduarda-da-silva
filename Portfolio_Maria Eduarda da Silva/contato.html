<section class="container">

<div class="texto">

<h2>Fale comigo</h2> 

<p class="p1">
Tem alguma dúvida, sugestão ou deseja trabalhar comigo?
Preencha o formulário abaixo e responderei o mais rápido possível.
</p>

<!-- Seção de contato -->
<section class="contato">
  <h2>Contato</h2>

  <!-- Formulario para contato -->
  <form id="formContato">
    <label for="nome">Nome:</label>
    <input type="text" id="nome" name="nome" placeholder="Seu nome">

    <label for="email">E-mail:</label>
    <input type="email" id="email" name="email" placeholder="seu@email.com">

    <label for="mensagem">Mensagem:</label>
    <textarea id="mensagem" name="mensagem" placeholder="Escreva sua mensagem"></textarea>

    <button type="submit">Enviar</button>
  </form>
</section>

<!-- Modal de confirmação com mensagem para o usuario-->
<div id="modal" class="modal">
  <div class="modal-content">
    <span id="fecharModal" class="fechar">&times;</span>
    <p>Mensagem enviada com sucesso!</p>
  </div>
</div>

</div>

</section>
